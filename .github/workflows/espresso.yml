name: Android Espresso Automation
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_level:
        description: Android API level
        default: "33"
        type: choice
        options: ["34","33","31","29"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  syntax-check:
    name: Kotlin Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kotlin files
        run: |
          find app/src/androidTest -name "*.kt" | while read f; do
            echo "  Validating: $f"
            if [ ! -s "$f" ]; then echo "ERROR: Empty $f"; exit 1; fi
          done
          total=$(grep -r "@Test\|fun test_" app/src/androidTest/ | wc -l)
          echo "Total test functions: $total"
          echo "Kotlin structure OK"
      - name: Validate build.gradle
        run: |
          grep -q "espresso-core" app/build.gradle && echo "✅ Espresso OK" || (echo "❌ Missing Espresso"; exit 1)
          grep -q "uiautomator"  app/build.gradle && echo "✅ UiAutomator OK"
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant Gradle permission
        run: chmod +x gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Build test APK
        run: ./gradlew assembleDebugAndroidTest --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 7
  espresso-tests:
    name: Espresso (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 31]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Run Espresso Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          target: google_apis
          disable-animations: true
          script: |
            ./gradlew connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=com.qa.automation.tests.login.LoginSmokeTests \
              --stacktrace 2>&1 | tee test-output.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: espresso-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            test-output.log
          retention-days: 30
  all-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [syntax-check, espresso-tests]
    if: always()
    steps:
      - name: Check
        run: |
          for r in "${{ needs.syntax-check.result }}" "${{ needs.espresso-tests.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then echo "Failed: $r"; exit 1; fi
          done
          echo "All checks passed"
